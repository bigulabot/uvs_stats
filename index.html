<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UVS Stats Counter</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="main-container">

    <!-- LEFT: COUNTERS -->
    <div class="counters-container">

      <!-- SPEED COUNTER -->
      <div class="counter-block">
        <button class="plus" onclick="incrementSpeed()">+</button>
        <div class="speed-counter" onclick="cycleSpeedState()">
          <img id="speedIcon" src="icons/Off.svg" alt="Speed Counter" />
          <div class="counter-value" id="speedCount">0</div>
        </div>
        <button class="minus" onclick="decrementSpeed()">-</button>
      </div>

      <!-- DAMAGE COUNTER -->
      <div class="counter-block">
        <button class="plus" onclick="incrementDamage()">+</button>
        <div class="damage-counter">
          <img src="icons/yellow-star.svg" class="damage-star" />
          <div class="counter-value" id="damageCount">0</div>
        </div>
        <button class="minus" onclick="decrementDamage()">-</button>
      </div>

    </div>

    <!-- RIGHT: RESET + PANELS -->
    <div class="right-section">

     <!-- PANELS BLOCK -->
<div class="hp-panels">
  <!-- SIDE ICONS COLUMN -->
  <div class="side-icons">
    <!-- Player Actions -->
    <div class="icon-group player-icons">
      <button id="fullDamageBtn" class="icon-btn">
        <img src="icons/player-full.svg" alt="Player Full Damage" />
      </button>
      <button id="halfDamageBtn" class="icon-btn">
        <img src="icons/player-half.svg" alt="Player Half Damage" />
      </button>
    </div>
    <!-- RESET (centered between) -->
    <div class="reset-icon-group">
      <button id="resetBtn" class="reset-btn">
        <img src="icons/block-reset.svg" alt="Reset" />
      </button>
    </div>
    <!-- Rival Actions -->
    <div class="icon-group rival-icons">
      <button id="fullDamageRivalBtn" class="icon-btn">
        <img src="icons/rival-full.svg" alt="Rival Full Damage" />
      </button>
      <button id="halfDamageRivalBtn" class="icon-btn">
        <img src="icons/rival-half.svg" alt="Rival Half Damage" />
      </button>
    </div>
  </div>
  <!-- PANELS STACK -->
  <div class="panels-stack">
    <div class="player-panel panel-box">
      <h2>Player</h2>
      <div class="hp-row">
        <span id="playerScore" class="score">25</span>
        <div class="increment-display"></div>
      </div>
    </div>
    <div class="rival-panel panel-box">
      <h2>Rival</h2>
      <div class="hp-row">
        <span id="rivalScore" class="score">25</span>
        <div class="increment-display"></div>
      </div>
    </div>
  </div>
</div>



  <script src="scripts/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service worker registered.', reg))
          .catch(err => console.log('Service worker registration failed.', err));
      });
    }
  </script>

</body>
</html>
